name: pensaconnect
description: "Ladies & Gents Wing App - Youth Ministry Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Animation
  cupertino_icons: ^1.0.6
  google_fonts: ^6.3.2         # FIX: 6.1.0 resolved to 6.3.1, which has a
                                # const Map<FontWeight, String> that breaks
                                # under current Dart's const-evaluation rules.
                                # Fixed upstream in 6.3.2+.
  flutter_svg: ^2.0.10
  flutter_animate: ^4.5.0      # Added for production feed animations
  skeletonizer: ^1.4.2         # Added for shimmer loading states
  shimmer: ^3.0.0
  animations: ^2.1.0
  badges: ^3.0.2
  # Networking & Data
  http: ^1.2.1
  dio: ^5.9.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  path: ^1.8.3
  # State Management & Architecture
  provider: ^6.1.1
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  # Navigation & Connectivity
  go_router: ^16.1.0
  app_links: ^6.4.1
  connectivity_plus: ^6.1.5
  url_launcher: ^6.3.0
  # Media & Tools
  youtube_player_iframe: ^5.2.2
  youtube_player_flutter: ^9.1.3
  just_audio: ^0.9.34
  chewie: ^1.5.0
  audioplayers: ^5.2.1
  video_player: ^2.8.2
  visibility_detector: ^0.4.0+2
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  screenshot: ^3.0.0
  share_plus: ^10.0.0
  flutter_email_sender: ^6.0.0
  permission_handler: ^11.0.1
  intl: ^0.20.2
  timeago: ^3.7.1
  font_awesome_flutter: ^10.10.0
  flutter_vector_icons: ^2.0.0
  flutter_dotenv: ^6.0.0
  table_calendar: ^3.2.0
  # Firebase
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  firebase_messaging: ^16.0.0
  firebase_storage: ^13.0.0
  firebase_analytics: ^12.0.0
  cloud_firestore: ^6.0.3
  google_sign_in: ^7.1.1
  flutter_facebook_auth: ^7.1.2
  # Real-time
  socket_io_client: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    #- .env                  # NOT restored: this file is gitignored and
                              # genuinely absent from the repo — declaring
                              # it as an asset breaks the build on a fresh
                              # clone. See note below if dotenv.load() needs it.
    - assets/.env             # restored: this one IS committed (your
                              # .gitignore has `!assets/.env`), confirmed
                              # present in the repo.
    - assets/images/
    - assets/icons/home.svg
    - assets/icons/discover.svg
    - assets/icons/favorites.svg
    - assets/icons/profile.svg
    - assets/icons/events.svg
    - assets/icons/bible.svg
    - assets/icons/worship.svg
    - assets/icons/live.svg
    - assets/icons/forum.svg
    - assets/icons/prayer.svg
    - assets/icons/testimony.svg
    - assets/icons/chat.svg
    - assets/icons/settings.svg
    - assets/icons/help.svg
    - assets/icons/notification.svg
    - assets/icons/menu.svg
    - assets/icons/back.svg
    - assets/icons/search.svg
    - assets/icons/send.svg
    - assets/icons/share.svg
    - assets/icons/like.svg
    - assets/icons/comment.svg
    - assets/icons/calendar.svg
    - assets/icons/members.svg
    - assets/icons/music.svg
    - assets/icons/group.svg
    - assets/icons/badge.svg
    - assets/icons/hands_pray.svg
  
  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/OpenSans-SemiBold.ttf
          weight: 600
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Noto
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
  generate: true
